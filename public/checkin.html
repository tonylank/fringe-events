<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--pri:#2D1B69;--acc:#7C3AED;--ok:#059669;--err:#DC2626;--warn:#D97706;--border:#E5E7EB;--muted:#6B7280}
body{font-family:'DM Sans',-apple-system,sans-serif;background:#0f0720;min-height:100vh;color:#fff}
.header h1,.pin-card h2{font-family:'Playfair Display',Georgia,serif}
.header{background:var(--pri);padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:700}
.header .event-name{font-size:13px;color:rgba(255,255,255,.65);margin-top:2px}

/* PIN gate */
#pinGate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.pin-card{background:#fff;color:#111;border-radius:16px;padding:32px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.pin-card h2{font-size:20px;font-weight:700;color:var(--pri);margin-bottom:6px}
.pin-card p{font-size:13px;color:var(--muted);margin-bottom:20px}
.pin-input{width:100%;padding:14px;font-size:24px;letter-spacing:8px;text-align:center;border:2px solid var(--border);border-radius:10px;outline:none;margin-bottom:14px}
.pin-input:focus{border-color:var(--acc)}
.pin-btn{width:100%;padding:14px;background:var(--acc);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer}
.pin-btn:hover{background:#6D28D9}
.pin-err{color:var(--err);font-size:13px;margin-top:8px;text-align:center}

/* Main check-in UI */
#checkinApp{display:none}
.search-bar{background:#1a0a2e;padding:16px 20px;position:sticky;top:0;z-index:10}
.search-wrap{display:flex;gap:10px}
.search-wrap input{flex:1;padding:13px 16px;border-radius:10px;border:none;font-size:16px;background:#fff;color:#111;outline:none}
.search-wrap input::placeholder{color:var(--muted)}
.clear-btn{padding:10px 16px;background:rgba(255,255,255,.15);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:14px}

.results{padding:12px 20px;max-width:600px;margin:0 auto}
.result-card{background:#fff;color:#111;border-radius:12px;margin-bottom:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.3)}
.result-card.checked{border-left:5px solid var(--ok)}
.result-card.declined{border-left:5px solid var(--err);opacity:.75}
.result-main{padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.result-main:active{background:#f9fafb}
.result-avatar{width:44px;height:44px;border-radius:50%;background:var(--pri);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-name{font-size:16px;font-weight:700;color:#111;margin-bottom:2px}
.result-email{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.result-badges{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.badge-dietary{background:#FEF3C7;color:#92400E;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.badge-access{background:#EDE9FE;color:#5B21B6;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
.result-status{font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.rs-pending{background:#FEF3C7;color:#92400E}
.rs-accepted{background:#D1FAE5;color:#065F46}
.rs-declined{background:#FEE2E2;color:#991B1B}
.rs-checked{background:#D1FAE5;color:#065F46}

/* Requirements detail panel */
.req-panel{display:none;background:#f8f7ff;border-top:1px solid #e5e7eb;padding:12px 16px}
.req-panel.open{display:block}
.req-row{margin-bottom:8px;font-size:13px}
.req-row:last-child{margin-bottom:0}
.req-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:2px}
.req-text{color:#111;line-height:1.5}

/* Actions */
.result-actions{padding:0 16px 14px;display:flex;gap:8px;flex-wrap:wrap}
.btn-checkin{flex:1;padding:12px;background:var(--ok);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;min-width:120px}
.btn-checkin:hover{opacity:.9}
.btn-undo{padding:12px 16px;background:#f3f4f6;color:var(--muted);border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-undo:hover{background:#e5e7eb;color:#111}
.checkin-time{font-size:12px;color:var(--ok);font-weight:600;padding:0 16px 6px}

/* Plus one section */
.plusone-section{border-top:1px dashed #e5e7eb;margin:0 16px;padding:10px 0 14px}
.plusone-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:8px}
.plusone-row{display:flex;align-items:center;gap:10px}
.plusone-name{font-size:14px;font-weight:600;color:#111;flex:1}
.btn-checkin-po{padding:9px 14px;background:var(--ok);color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer}
.btn-checkin-po:hover{opacity:.9}
.btn-undo-po{padding:9px 12px;background:#f3f4f6;color:var(--muted);border:none;border-radius:7px;font-size:12px;cursor:pointer}
.btn-undo-po:hover{background:#e5e7eb;color:#111}
.po-checked-time{font-size:11px;color:var(--ok);font-weight:600}

.empty{text-align:center;padding:48px 20px;color:rgba(255,255,255,.45)}
.empty-icon{font-size:48px;margin-bottom:12px}
.stats-bar{background:rgba(255,255,255,.08);padding:12px 20px;display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,.08)}
.stat{font-size:13px;color:rgba(255,255,255,.75)}.stat strong{color:#fff;font-size:16px;margin-right:4px}

.success-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--ok);color:#fff;padding:28px 40px;border-radius:16px;font-size:22px;font-weight:700;z-index:999;text-align:center;pointer-events:none;opacity:0;transition:opacity .2s;box-shadow:0 8px 40px rgba(0,0,0,.4)}
.success-flash.show{opacity:1}
</style>
</head>
<body>

<!-- PIN Gate -->
<div id="pinGate">
  <div class="pin-card">
    <h2>Event Check-in</h2>
    <p id="pinEventLabel">Enter your check-in PIN to continue</p>
    <input class="pin-input" id="pinInput" type="text" inputmode="numeric" maxlength="10" placeholder="PIN"
      onkeydown="if(event.key==='Enter')verifyPin()">
    <button class="pin-btn" onclick="verifyPin()">Continue</button>
    <div class="pin-err" id="pinErr"></div>
  </div>
</div>

<!-- Main App -->
<div id="checkinApp">
  <div class="header">
    <div>
      <h1>Check-in</h1>
      <div class="event-name" id="appEventName"></div>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="search-bar">
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search name, email, or RSVP code…"
        oninput="doSearch()" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="clear-btn" onclick="clearSearch()">Clear</button>
    </div>
  </div>
  <div class="results" id="results">
    <div class="empty"><div class="empty-icon">🔍</div><div>Search for a guest to check them in</div></div>
  </div>
</div>

<div class="success-flash" id="flash"></div>

<script>
'use strict';

const pathParts = window.location.pathname.split('/');
const eventSlug = pathParts[pathParts.length - 1];

let eventId = null;
let searchTimer;

async function verifyPin() {
  const pin = document.getElementById('pinInput').value.trim();
  if (!pin) return;
  document.getElementById('pinErr').textContent = '';
  try {
    const r = await fetch(`/api/checkin-page-init?slug=${encodeURIComponent(eventSlug)}&pin=${encodeURIComponent(pin)}`);
    const j = await r.json();
    if (!r.ok) { document.getElementById('pinErr').textContent = j.error || 'Invalid PIN'; return; }
    eventId = j.eventId;
    document.getElementById('pinGate').style.display = 'none';
    document.getElementById('checkinApp').style.display = 'block';
    document.getElementById('appEventName').textContent = j.eventName;
    document.getElementById('searchInput').focus();
    loadStats();
  } catch { document.getElementById('pinErr').textContent = 'Connection error'; }
}

async function loadStats() {
  try {
    const r = await fetch(`/api/checkin/${eventId}/stats`);
    const s = await r.json();
    const accepted = parseInt(s.accepted)||0;
    const checkedIn = parseInt(s.checked_in)||0;
    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><strong>${s.total||0}</strong>Guests</div>
      <div class="stat"><strong>${accepted}</strong>Accepted</div>
      <div class="stat"><strong>${checkedIn}</strong>Checked In</div>
      <div class="stat"><strong>${accepted - checkedIn}</strong>Remaining</div>`;
  } catch {}
}

function doSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) {
    document.getElementById('results').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>Search for a guest to check them in</div></div>';
    return;
  }
  searchTimer = setTimeout(() => fetchResults(q), 250);
}

async function fetchResults(q) {
  try {
    const r = await fetch(`/api/checkin/${eventId}/search?q=${encodeURIComponent(q)}`);
    const guests = await r.json();
    renderResults(guests);
  } catch { document.getElementById('results').innerHTML = '<div class="empty">Connection error</div>'; }
}

function renderResults(guests) {
  const el = document.getElementById('results');
  if (!guests.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">👤</div><div>No guests found</div></div>';
    return;
  }
  el.innerHTML = guests.map(g => {
    const initials = (g.first_name[0]||'') + (g.last_name[0]||'');
    const isIn = !!g.checked_in_at;
    const statusClass = isIn ? 'rs-checked' : `rs-${g.status}`;
    const statusLabel = isIn ? `✓ ${fmtTime(g.checked_in_at)}` : g.status;
    const hasDietary = !!(g.dietary_requirements && g.dietary_requirements.trim());
    const hasAccess = !!(g.accessibility_needs && g.accessibility_needs.trim());
    const hasReqs = hasDietary || hasAccess;

    // Requirements detail panel
    const reqPanel = hasReqs ? `
      <div class="req-panel" id="req-${g.id}">
        ${hasDietary ? `<div class="req-row"><div class="req-label">🍽 Dietary requirements</div><div class="req-text">${escH(g.dietary_requirements)}</div></div>` : ''}
        ${hasAccess ? `<div class="req-row"><div class="req-label">♿ Accessibility needs</div><div class="req-text">${escH(g.accessibility_needs)}</div></div>` : ''}
      </div>` : '';

    // Plus one section
    const poChecked = !!g.plus_one_checked_in_at;
    const plusOneSection = g.plus_one_name ? `
      <div class="plusone-section">
        <div class="plusone-label">Plus One</div>
        <div class="plusone-row">
          <div class="plusone-name">+ ${escH(g.plus_one_name)}</div>
          ${poChecked
            ? `<span class="po-checked-time">✓ ${fmtTime(g.plus_one_checked_in_at)}</span>
               <button class="btn-undo-po" onclick="uncheckInPlusOne(${g.id})">Undo</button>`
            : `<button class="btn-checkin-po" onclick="checkInPlusOne(${g.id})">✓ Check In</button>`}
        </div>
      </div>` : '';

    return `<div class="result-card${isIn?' checked':g.status==='declined'?' declined':''}" id="rc-${g.id}">
      <div class="result-main" onclick="toggleReqs(${g.id},${hasReqs})">
        <div class="result-avatar">${initials}</div>
        <div class="result-info">
          <div class="result-name">${escH(g.first_name)} ${escH(g.last_name)}</div>
          <div class="result-email">${escH(g.email)}${g.company?' · '+escH(g.company):''}</div>
          ${hasReqs ? `<div class="result-badges">
            ${hasDietary ? '<span class="badge-dietary">🍽 Dietary</span>' : ''}
            ${hasAccess ? '<span class="badge-access">♿ Accessibility</span>' : ''}
          </div>` : ''}
        </div>
        <span class="result-status ${statusClass}">${statusLabel}</span>
      </div>
      ${reqPanel}
      ${isIn ? `<div class="checkin-time">Checked in at ${fmtTime(g.checked_in_at)}</div>` : ''}
      ${plusOneSection}
      <div class="result-actions">
        ${isIn
          ? `<button class="btn-undo" onclick="uncheckIn(${g.id})">Undo check-in</button>`
          : `<button class="btn-checkin" onclick="checkIn(${g.id})">✓ Check In</button>`}
      </div>
    </div>`;
  }).join('');
}

function toggleReqs(id, hasReqs) {
  if (!hasReqs) return;
  const panel = document.getElementById(`req-${id}`);
  if (panel) panel.classList.toggle('open');
}

async function checkIn(egId) {
  try {
    const r = await fetch(`/api/checkin/${eventId}/guests/${egId}/checkin`, { method:'POST' });
    if (r.ok) { showFlash('✓ Checked In!'); doSearch(); loadStats(); }
  } catch {}
}

async function uncheckIn(egId) {
  try {
    const r = await fetch(`/api/checkin/${eventId}/guests/${egId}/uncheckin`, { method:'POST' });
    if (r.ok) { doSearch(); loadStats(); }
  } catch {}
}

async function checkInPlusOne(egId) {
  try {
    const r = await fetch(`/api/checkin/${eventId}/guests/${egId}/checkin-plusone`, { method:'POST' });
    if (r.ok) { showFlash('✓ Plus One Checked In!'); doSearch(); loadStats(); }
  } catch {}
}

async function uncheckInPlusOne(egId) {
  try {
    const r = await fetch(`/api/checkin/${eventId}/guests/${egId}/uncheckin-plusone`, { method:'POST' });
    if (r.ok) { doSearch(); loadStats(); }
  } catch {}
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('results').innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div>Search for a guest to check them in</div></div>';
  document.getElementById('searchInput').focus();
}

function showFlash(msg) {
  const el = document.getElementById('flash');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1200);
}

function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtTime(d){if(!d)return'';return new Date(d).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
</script>
</body>
</html>
